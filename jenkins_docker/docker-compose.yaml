services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    restart: on-failure
    networks:
      - jenkins-net

  agent-1:
    build:
      context: .
      dockerfile: jenkins-agent.Dockerfile
    depends_on:
      - jenkins
    restart: on-failure
    environment:
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_AGENT_NAME=agent-1
      - JENKINS_AGENT_WORKDIR=/home/jenkins/agent
      - JENKINS_SECRET=${JENKINS_SECRET}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Same path on host + agent so nested `docker run -v $PWD` works if needed.
      - /home/jenkins/agent:/home/jenkins/agent
    group_add:
      - ${DOCKER_GROUP_ID}
    networks:
      - jenkins-net

volumes:
  jenkins_home:

networks:
  jenkins-net: